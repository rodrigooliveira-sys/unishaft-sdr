<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniShaft · Dashboard SDR</title>
<style>
:root {
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-pale:rgba(201,168,76,0.1);
  --dark:#0C0C0A;--dark2:#131310;--dark3:#1A1A15;--dark4:#222220;--dark5:#2A2A26;
  --text:#E8E5DC;--text2:#A8A59C;--text3:#666460;
  --border:rgba(201,168,76,0.15);--border2:rgba(255,255,255,0.06);
  --hot:#E07050;--hot-bg:rgba(224,112,80,0.12);--hot-border:rgba(224,112,80,0.35);
  --warm:#C9A84C;--warm-bg:rgba(201,168,76,0.1);--warm-border:rgba(201,168,76,0.35);
  --cold:#5A8FD4;--cold-bg:rgba(90,143,212,0.1);--cold-border:rgba(90,143,212,0.3);
  --green:#5CB87A;--green-bg:rgba(92,184,122,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;font-size:14px;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-screen.hide{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--dark4);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text3);}
.loading-logo{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px;}
.loading-logo span{color:var(--gold);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;color:var(--text);z-index:8888;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(92,184,122,0.4);color:var(--green);}
.toast.err{border-color:rgba(224,80,80,0.4);color:#E05050;}

.header{background:var(--dark2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:900;color:#fff;} .logo span{color:var(--gold);}
.header-tag{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;gap:8px;align-items:center;}
.sync-info{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sync-dot.loading{background:var(--warm);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;font-family:inherit;}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border);color:var(--text);}
.btn-primary{background:var(--gold);border-color:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-light);}

.nav-tabs{display:flex;background:var(--dark2);border-bottom:1px solid var(--border2);padding:0 20px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:11px 16px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:1px;text-transform:uppercase;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.main{padding:18px 20px 60px;max-width:1400px;margin:0 auto;}
.panel{display:none;} .panel.active{display:block;}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.kpi.hot::after{background:var(--hot);}.kpi.warm::after{background:var(--warm);}.kpi.cold::after{background:var(--cold);}.kpi.green::after{background:var(--green);}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.kpi-value{font-size:30px;font-weight:900;color:#fff;line-height:1;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;}

.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:800px){.charts-row{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.charts-row{grid-template-columns:1fr;}}
.chart-card{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:16px;}
.chart-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.donut-wrap{display:flex;align-items:center;gap:14px;height:160px;}
.donut-legend{display:flex;flex-direction:column;gap:5px;flex:1;}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.donut-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.donut-legend-val{margin-left:auto;font-weight:700;color:var(--text);}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.filter-input{background:var(--dark3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.filter-input:focus{border-color:var(--border);}
.filter-input::placeholder{color:var(--text3);}
select.filter-input option{background:var(--dark3);}
.filter-count{font-size:11px;color:var(--text3);}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border2);}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:980px;}
thead{background:var(--dark4);position:sticky;top:0;z-index:5;}
thead th{padding:9px 11px;text-align:left;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;font-weight:600;}
thead th:hover{color:var(--gold);}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.03);transition:background .1s;}
tbody tr:hover{background:var(--dark4);}
tbody td{padding:7px 11px;vertical-align:middle;}
tbody td input,tbody td select{background:transparent;border:none;color:var(--text);font-size:12px;font-family:inherit;width:100%;outline:none;padding:2px 0;}
tbody td input:focus,tbody td select:focus{background:var(--dark5);border-radius:4px;padding:2px 6px;}
tbody td select option{background:var(--dark3);}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
.badge.quente{background:var(--hot-bg);color:var(--hot);border:1px solid var(--hot-border);}
.badge.morno{background:var(--warm-bg);color:var(--warm);border:1px solid var(--warm-border);}
.badge.frio{background:var(--cold-bg);color:var(--cold);border:1px solid var(--cold-border);}
.badge.novo{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border2);}
.badge.e1{background:rgba(130,100,255,0.1);color:#AA88FF;border:1px solid rgba(130,100,255,0.3);}
.badge.e2{background:rgba(80,140,255,0.1);color:#80AAFF;border:1px solid rgba(80,140,255,0.3);}
.badge.e3{background:var(--warm-bg);color:var(--warm);border:1px solid var(--warm-border);}
.badge.e4{background:var(--hot-bg);color:var(--hot);border:1px solid var(--hot-border);}
.badge.ef{background:var(--green-bg);color:var(--green);border:1px solid rgba(92,184,122,0.3);}
.sdr-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:var(--dark5);color:var(--text2);border:1px solid var(--border2);}
.row-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:4px;transition:all .15s;}
.row-del:hover{color:#E05050;background:rgba(224,80,80,0.1);}
.saving{opacity:.5;pointer-events:none;}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.pg-info{font-size:11px;color:var(--text3);}
.pg-btns{display:flex;gap:5px;}
.pg-btn{width:28px;height:28px;border-radius:5px;border:1px solid var(--border2);background:var(--dark3);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pg-btn:hover{border-color:var(--border);color:var(--text);}
.pg-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:700;}
.pg-btn:disabled{opacity:.3;cursor:not-allowed;}

.visit-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.vc{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:14px;transition:border-color .2s;}
.vc:hover{border-color:var(--border);}
.vc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.vc-name{font-size:14px;font-weight:800;color:#fff;}
.vc-city{font-size:11px;color:var(--text3);margin-top:1px;}
.vc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.vc-key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.vc-val{font-size:11px;color:var(--text);font-weight:500;}
.vc-obs{margin-top:8px;padding:7px 9px;background:var(--dark4);border-radius:6px;font-size:11px;color:var(--text2);line-height:1.5;border-left:2px solid var(--gold);}

.rank-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--dark4);border-radius:8px;margin-bottom:8px;}
.rank-pos{font-size:22px;font-weight:900;color:var(--gold);width:30px;}
.rank-name{flex:1;font-weight:700;font-size:14px;}
.rank-stat{text-align:center;min-width:55px;}
.rank-stat-val{font-size:20px;font-weight:900;}
.rank-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:22px;width:92%;max-width:580px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:16px;color:var(--gold);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:480px){.modal-grid{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{background:var(--dark4);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg select option{background:var(--dark3);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.vencido{color:var(--hot)!important;font-weight:700;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--dark2);}
::-webkit-scrollbar-thumb{background:var(--dark5);border-radius:2px;}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-logo">Uni<span>Shaft</span></div>
  <div class="spinner"></div>
  <div class="loading-text">Carregando leads da planilha...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="header">
  <div>
    <div class="logo">Uni<span>Shaft</span></div>
    <div class="header-tag">Dashboard SDR</div>
  </div>
  <div class="header-right">
    <div class="sync-info">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">sincronizado</span>
    </div>
    <button class="btn btn-ghost" onclick="loadLeads()">↻ Atualizar</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-primary" onclick="openModal()">+ Novo Lead</button>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchPanel('dashboard')">Dashboard</div>
  <div class="nav-tab" onclick="switchPanel('leads')">Leads</div>
  <div class="nav-tab" onclick="switchPanel('visitas')">Visitas</div>
  <div class="nav-tab" onclick="switchPanel('ranking')">Ranking SDR</div>
</div>

<div class="main">
  <div class="panel active" id="panel-dashboard">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="charts-row" id="charts-row-1"></div>
    <div class="charts-row" id="charts-row-2" style="grid-template-columns:2fr 1fr;"></div>
  </div>

  <div class="panel" id="panel-leads">
    <div class="filters">
      <input class="filter-input" id="f-busca" placeholder="🔍 Buscar..." oninput="applyFilters()" style="width:200px;">
      <select class="filter-input" id="f-sdr" onchange="applyFilters()"><option value="">Todos SDRs</option></select>
      <select class="filter-input" id="f-seg" onchange="applyFilters()">
        <option value="">Segmento</option>
        <option>Eng. Hidrossanitária</option><option>Arquiteto</option><option>Construtora</option>
      </select>
      <select class="filter-input" id="f-temp" onchange="applyFilters()">
        <option value="">Temperatura</option>
        <option>Quente</option><option>Morno</option><option>Frio</option><option>Novo</option>
      </select>
      <select class="filter-input" id="f-etapa" onchange="applyFilters()">
        <option value="">Etapa</option>
        <option>1 - Identificar</option><option>2 - Apresentação</option>
        <option>3 - Qualificar</option><option>4 - Visita/Amostra</option><option>Fechado</option>
      </select>
      <select class="filter-input" id="f-cidade" onchange="applyFilters()"><option value="">Cidade</option></select>
      <button class="btn btn-ghost" onclick="clearFilters()" style="font-size:11px;padding:7px 12px;">✕</button>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('empresa')">Empresa ↕</th>
            <th onclick="sortBy('contato')">Contato ↕</th>
            <th onclick="sortBy('segmento')">Segmento ↕</th>
            <th onclick="sortBy('cidade')">Cidade ↕</th>
            <th onclick="sortBy('sdr')">SDR ↕</th>
            <th onclick="sortBy('etapa')">Etapa ↕</th>
            <th onclick="sortBy('temperatura')">Temp ↕</th>
            <th onclick="sortBy('metros')">M/Mês ↕</th>
            <th onclick="sortBy('proximo_contato')">Próx. Contato ↕</th>
            <th onclick="sortBy('visita')">Visita ↕</th>
            <th>Obs</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="pg-info" id="pg-info"></div>
      <div class="pg-btns" id="pg-btns"></div>
    </div>
  </div>

  <div class="panel" id="panel-visitas">
    <div class="filters" style="margin-bottom:14px;">
      <select class="filter-input" id="vf-sdr" onchange="renderVisitas()"><option value="">Todos SDRs</option></select>
      <select class="filter-input" id="vf-temp" onchange="renderVisitas()">
        <option value="">Quentes + Mornos</option><option>Quente</option><option>Morno</option>
      </select>
    </div>
    <div class="visit-cards" id="visit-cards"></div>
  </div>

  <div class="panel" id="panel-ranking">
    <div class="charts-row" id="rank-charts" style="margin-bottom:18px;"></div>
    <div id="ranking-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">+ Novo Lead</div>
    <div class="modal-grid">
      <div class="fg"><label>Empresa *</label><input id="m-empresa" placeholder="Nome da empresa"></div>
      <div class="fg"><label>Contato</label><input id="m-contato" placeholder="Nome"></div>
      <div class="fg"><label>WhatsApp</label><input id="m-whatsapp" placeholder="(47) 99999-0000"></div>
      <div class="fg"><label>Segmento *</label>
        <select id="m-seg"><option value="">Selecionar...</option>
          <option>Eng. Hidrossanitária</option><option>Arquiteto</option><option>Construtora</option>
        </select>
      </div>
      <div class="fg"><label>Cidade</label><input id="m-cidade" placeholder="Cidade"></div>
      <div class="fg"><label>Estado</label>
        <select id="m-estado"><option>SC</option><option>PR</option><option>SP</option><option>RS</option><option>Outro</option></select>
      </div>
      <div class="fg"><label>SDR *</label><input id="m-sdr" placeholder="Seu nome"></div>
      <div class="fg"><label>Etapa</label>
        <select id="m-etapa">
          <option>1 - Identificar</option><option>2 - Apresentação</option>
          <option>3 - Qualificar</option><option>4 - Visita/Amostra</option><option>Fechado</option>
        </select>
      </div>
      <div class="fg"><label>Temperatura</label>
        <select id="m-temp"><option>Novo</option><option>Quente</option><option>Morno</option><option>Frio</option></select>
      </div>
      <div class="fg"><label>Metros/mês</label><input id="m-metros" type="number" placeholder="Ex: 30"></div>
      <div class="fg"><label>Próx. Contato</label><input id="m-dt" type="date"></div>
      <div class="fg"><label>Visita</label>
        <select id="m-visita"><option>Não</option><option>Sim</option></select>
      </div>
    </div>
    <div class="fg" style="margin-bottom:4px;">
      <label>Observação</label>
      <textarea id="m-obs" rows="2" placeholder="Anotações..." style="resize:vertical;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="addLead()">Salvar</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw8PNHDQ8fl3Rad2YkfWtRJZqz_SNws7yvECxm6FuOMKCdrdLTI3sUPlgPD6_dDTmHmeQ/exec';
let leads = [], filtered = [], currentPage = 1, PAGE = 50, sortF = 'empresa', sortD = 1;

// ── API ───────────────────────────────────────────────────
function setSyncing(on) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (on ? ' loading' : '');
  lbl.textContent = on ? 'sincronizando...' : 'sincronizado';
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function loadLeads() {
  setSyncing(true);
  fetch(API + '?action=get')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      leads = (data.leads || []).map(function(l) {
        return {
          id: String(l.id || ''),
          empresa: String(l.empresa || ''),
          contato: String(l.contato || ''),
          whatsapp: String(l.whatsapp || ''),
          segmento: String(l.segmento || ''),
          cidade: String(l.cidade || ''),
          estado: String(l.estado || ''),
          sdr: String(l.sdr || ''),
          etapa: String(l.etapa || '1 - Identificar'),
          temperatura: String(l.temperatura || 'Novo'),
          metros: parseInt(l.metros) || 0,
          proximo_contato: String(l.proximo_contato || ''),
          visita: String(l.visita || 'Não'),
          obs: String(l.obs || '')
        };
      });
      filtered = leads.slice();
      renderAll();
      setSyncing(false);
      document.getElementById('loading').classList.add('hide');
    })
    .catch(function(err) {
      setSyncing(false);
      document.getElementById('loading').classList.add('hide');
      toast('Erro ao carregar dados. Verifique a conexão.', 'err');
    });
}

function apiPost(payload, onOk, onErr) {
  setSyncing(true);
  fetch(API, {
    method: 'POST',
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    setSyncing(false);
    if (data.ok) { if (onOk) onOk(); }
    else { if (onErr) onErr(data.error || 'erro'); }
  })
  .catch(function(err) {
    setSyncing(false);
    if (onErr) onErr(err.message);
  });
}

// ── RENDER ALL ────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderCharts();
  applyFilters();
  renderVisitas();
  renderRanking();
  updateSelects();
}

// ── KPIs ─────────────────────────────────────────────────
function renderKPIs() {
  var hoje = new Date().toISOString().split('T')[0];
  var t = leads.length;
  var q = leads.filter(function(l){return l.temperatura==='Quente';}).length;
  var m = leads.filter(function(l){return l.temperatura==='Morno';}).length;
  var fr = leads.filter(function(l){return l.temperatura==='Frio';}).length;
  var v = leads.filter(function(l){return l.visita==='Sim';}).length;
  var f = leads.filter(function(l){return l.etapa==='Fechado';}).length;
  var vc = leads.filter(function(l){return l.proximo_contato&&l.proximo_contato<hoje&&l.etapa!=='Fechado';}).length;
  var items = [
    {label:'Total Leads',val:t,sub:'cadastrados',cls:''},
    {label:'🔴 Quentes',val:q,sub:'+25 m/mês',cls:'hot'},
    {label:'🟡 Mornos',val:m,sub:'esporádico',cls:'warm'},
    {label:'🔵 Frios',val:fr,sub:'sem shaft',cls:'cold'},
    {label:'Visitas',val:v,sub:'realizadas',cls:'green'},
    {label:'Fechados',val:f,sub:'convertidos',cls:'green'},
    {label:'⚠ Vencidos',val:vc,sub:'aguardam contato',cls:'hot'},
  ];
  document.getElementById('kpi-row').innerHTML = items.map(function(k){
    return '<div class="kpi '+k.cls+'"><div class="kpi-label">'+k.label+'</div><div class="kpi-value">'+k.val+'</div><div class="kpi-sub">'+k.sub+'</div></div>';
  }).join('');
}

// ── CHARTS ────────────────────────────────────────────────
function renderCharts() {
  var tempC = {Quente:0,Morno:0,Frio:0,Novo:0};
  var segC = {}, etapaC = {}, cidadeC = {}, sdrC = {};
  leads.forEach(function(l) {
    if (tempC[l.temperatura] !== undefined) tempC[l.temperatura]++;
    segC[l.segmento] = (segC[l.segmento]||0)+1;
    etapaC[l.etapa] = (etapaC[l.etapa]||0)+1;
    if (l.cidade) cidadeC[l.cidade] = (cidadeC[l.cidade]||0)+1;
    if (l.sdr) sdrC[l.sdr] = (sdrC[l.sdr]||0)+1;
  });
  var topCidades = Object.entries(cidadeC).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  document.getElementById('charts-row-1').innerHTML =
    '<div class="chart-card"><div class="chart-title">Temperatura</div>'+donut(tempC,['#E07050','#C9A84C','#5A8FD4','#555550'])+'</div>'+
    '<div class="chart-card"><div class="chart-title">Segmento</div>'+donut(segC,['#C9A84C','#5CB87A','#5A8FD4','#E07050'])+'</div>'+
    '<div class="chart-card"><div class="chart-title">Etapa do Funil</div>'+bars(etapaC,['#C9A84C','#80AAFF','#E07050','#5CB87A','#AA88FF'],true)+'</div>';
  document.getElementById('charts-row-2').innerHTML =
    '<div class="chart-card"><div class="chart-title">Top Cidades</div>'+bars(Object.fromEntries(topCidades),['#C9A84C'],false)+'</div>'+
    '<div class="chart-card"><div class="chart-title">Leads por SDR</div>'+bars(sdrC,['#5CB87A'],false)+'</div>';
}

function donut(data, colors) {
  var entries = Object.entries(data).filter(function(e){return e[1]>0;});
  var total = entries.reduce(function(s,e){return s+e[1];},0);
  if (!total) return '<div style="color:var(--text3);font-size:12px;padding:20px;">Sem dados</div>';
  var cx=70,cy=70,r=55,inner=30,angle=-Math.PI/2,paths='';
  entries.forEach(function(entry,i) {
    var label=entry[0],val=entry[1];
    var sweep=(val/total)*2*Math.PI;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    var x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
    var ix1=cx+inner*Math.cos(angle),iy1=cy+inner*Math.sin(angle);
    var ix2=cx+inner*Math.cos(angle+sweep),iy2=cy+inner*Math.sin(angle+sweep);
    var lg=sweep>Math.PI?1:0;
    var color=colors[i%colors.length];
    paths+='<path d="M'+ix1+','+iy1+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' L'+ix2+','+iy2+' A'+inner+','+inner+' 0 '+lg+',0 '+ix1+','+iy1+'" fill="'+color+'" opacity=".9"/>';
    angle+=sweep;
  });
  var legend=entries.map(function(entry,i){
    return '<div class="donut-legend-item"><div class="donut-legend-dot" style="background:'+colors[i%colors.length]+'"></div><span>'+entry[0]+'</span><span class="donut-legend-val">'+entry[1]+'</span></div>';
  }).join('');
  return '<div class="donut-wrap"><svg width="140" height="140" style="flex-shrink:0;">'+paths+'<text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" fill="#E8E5DC" font-size="16" font-weight="900">'+total+'</text></svg><div class="donut-legend">'+legend+'</div></div>';
}

function bars(data, colors, horiz) {
  var entries = Object.entries(data).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  if (!entries.length) return '<div style="color:var(--text3);font-size:12px;padding:20px;">Sem dados</div>';
  var max = Math.max.apply(null, entries.map(function(e){return e[1];}));
  if (horiz) {
    return '<div style="display:flex;flex-direction:column;gap:5px;height:160px;overflow-y:auto;">'+
      entries.map(function(e,i){
        return '<div style="display:flex;align-items:center;gap:8px;"><div style="font-size:10px;color:var(--text3);width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;">'+e[0]+'</div><div style="flex:1;height:14px;background:var(--dark5);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+(e[1]/max*100)+'%;background:'+colors[i%colors.length]+';border-radius:3px;"></div></div><div style="font-size:10px;color:var(--text);font-weight:700;width:18px;text-align:right;">'+e[1]+'</div></div>';
      }).join('')+'</div>';
  } else {
    return '<div style="display:flex;align-items:flex-end;gap:6px;height:150px;padding-top:10px;">'+
      entries.map(function(e,i){
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0;"><div style="font-size:10px;color:var(--text2);font-weight:700;">'+e[1]+'</div><div style="width:100%;background:'+colors[i%colors.length]+';border-radius:4px 4px 0 0;height:'+Math.max(4,(e[1]/max)*110)+'px;"></div><div style="font-size:9px;color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;">'+e[0]+'</div></div>';
      }).join('')+'</div>';
  }
}

// ── TABLE ─────────────────────────────────────────────────
function applyFilters() {
  var b=(document.getElementById('f-busca').value||'').toLowerCase();
  var s=document.getElementById('f-sdr').value;
  var sg=document.getElementById('f-seg').value;
  var t=document.getElementById('f-temp').value;
  var e=document.getElementById('f-etapa').value;
  var c=document.getElementById('f-cidade').value;
  filtered=leads.filter(function(l){
    if(b&&!(l.empresa+l.contato+l.cidade+l.obs).toLowerCase().includes(b))return false;
    if(s&&l.sdr!==s)return false;
    if(sg&&l.segmento!==sg)return false;
    if(t&&l.temperatura!==t)return false;
    if(e&&l.etapa!==e)return false;
    if(c&&l.cidade!==c)return false;
    return true;
  });
  currentPage=1; renderTable();
  document.getElementById('filter-count').textContent=filtered.length+' registro(s)';
}

function clearFilters(){
  ['f-busca','f-sdr','f-seg','f-temp','f-etapa','f-cidade'].forEach(function(id){document.getElementById(id).value='';});
  applyFilters();
}

function sortBy(f){
  sortD = sortF===f ? sortD*-1 : 1; sortF=f;
  filtered.sort(function(a,b){var av=a[f]||'',bv=b[f]||'';return av<bv?-sortD:av>bv?sortD:0;});
  renderTable();
}

function renderTable(){
  var s=(currentPage-1)*PAGE, e=s+PAGE, page=filtered.slice(s,e);
  var hoje=new Date().toISOString().split('T')[0];
  var tbody=document.getElementById('leads-tbody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--text3);">Nenhum lead encontrado</td></tr>';
    pgUI(); return;
  }
  var tc=function(t){return t==='Quente'?'quente':t==='Morno'?'morno':t==='Frio'?'frio':'novo';};
  var ec=function(e){return e.startsWith('1')?'e1':e.startsWith('2')?'e2':e.startsWith('3')?'e3':e.startsWith('4')?'e4':e==='Fechado'?'ef':'';};
  tbody.innerHTML=page.map(function(l){
    var venc=l.proximo_contato&&l.proximo_contato<hoje&&l.etapa!=='Fechado';
    return '<tr>'+
      '<td><input value="'+x(l.empresa)+'" onblur="upd(\''+l.id+'\',\'empresa\',this.value)" style="min-width:110px;"></td>'+
      '<td><input value="'+x(l.contato)+'" onblur="upd(\''+l.id+'\',\'contato\',this.value)" style="min-width:90px;"></td>'+
      '<td><select onchange="upd(\''+l.id+'\',\'segmento\',this.value)">'+['Eng. Hidrossanitária','Arquiteto','Construtora'].map(function(o){return'<option '+(l.segmento===o?'selected':'')+'>'+o+'</option>';}).join('')+'</select></td>'+
      '<td><input value="'+x(l.cidade)+'" onblur="upd(\''+l.id+'\',\'cidade\',this.value)" style="min-width:80px;"></td>'+
      '<td><span class="sdr-tag">'+x(l.sdr)+'</span></td>'+
      '<td><span class="badge '+ec(l.etapa)+'">'+l.etapa+'</span></td>'+
      '<td><select onchange="upd(\''+l.id+'\',\'temperatura\',this.value)">'+['Novo','Quente','Morno','Frio'].map(function(o){return'<option '+(l.temperatura===o?'selected':'')+'>'+o+'</option>';}).join('')+'</select></td>'+
      '<td><input type="number" value="'+(l.metros||'')+'" onblur="upd(\''+l.id+'\',\'metros\',this.value)" style="width:54px;text-align:center;"></td>'+
      '<td><input type="date" value="'+(l.proximo_contato||'')+'" onchange="upd(\''+l.id+'\',\'proximo_contato\',this.value)" class="'+(venc?'vencido':'')+'" style="width:128px;"></td>'+
      '<td><select onchange="upd(\''+l.id+'\',\'visita\',this.value)"><option '+(l.visita==='Não'?'selected':'')+'>Não</option><option '+(l.visita==='Sim'?'selected':'')+'>Sim</option></select></td>'+
      '<td><input value="'+x(l.obs)+'" onblur="upd(\''+l.id+'\',\'obs\',this.value)" style="min-width:150px;color:var(--text2);"></td>'+
      '<td><button class="row-del" onclick="del(\''+l.id+'\')">✕</button></td>'+
    '</tr>';
  }).join('');
  pgUI();
}

function pgUI(){
  var tot=Math.ceil(filtered.length/PAGE);
  var s=(currentPage-1)*PAGE;
  document.getElementById('pg-info').textContent=(s+1)+'–'+Math.min(s+PAGE,filtered.length)+' de '+filtered.length;
  var h='<button class="pg-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';
  for(var i=Math.max(1,currentPage-2);i<=Math.min(tot,currentPage+2);i++)
    h+='<button class="pg-btn '+(i===currentPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  h+='<button class="pg-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage>=tot?'disabled':'')+'>›</button>';
  document.getElementById('pg-btns').innerHTML=h;
}

function goPage(p){var t=Math.ceil(filtered.length/PAGE);if(p<1||p>t)return;currentPage=p;renderTable();}

function upd(id, field, value) {
  var lead = leads.find(function(l){return String(l.id)===String(id);});
  if (!lead) return;
  lead[field] = field==='metros' ? parseInt(value)||0 : value;
  apiPost({action:'update', lead:lead},
    function(){ toast('Salvo ✓','ok'); renderAll(); },
    function(err){ toast('Erro ao salvar: '+err,'err'); }
  );
}

function del(id){
  if(!confirm('Excluir este lead?'))return;
  apiPost({action:'delete', id:id},
    function(){ toast('Excluído','ok'); leads=leads.filter(function(l){return String(l.id)!==String(id);}); filtered=filtered.filter(function(l){return String(l.id)!==String(id);}); renderAll(); },
    function(err){ toast('Erro: '+err,'err'); }
  );
}

function x(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function updateSelects(){
  var sdrs=[...new Set(leads.map(function(l){return l.sdr;}).filter(Boolean))].sort();
  var cidades=[...new Set(leads.map(function(l){return l.cidade;}).filter(Boolean))].sort();
  ['f-sdr','vf-sdr'].forEach(function(id){
    var el=document.getElementById(id); if(!el)return;
    var v=el.value;
    el.innerHTML='<option value="">Todos SDRs</option>'+sdrs.map(function(s){return'<option '+(v===s?'selected':'')+'>'+s+'</option>';}).join('');
  });
  var ec=document.getElementById('f-cidade'); if(ec){
    var v=ec.value;
    ec.innerHTML='<option value="">Cidade</option>'+cidades.map(function(c){return'<option '+(v===c?'selected':'')+'>'+c+'</option>';}).join('');
  }
}

// ── VISITAS ───────────────────────────────────────────────
function renderVisitas(){
  var sdr=document.getElementById('vf-sdr')?.value||'';
  var temp=document.getElementById('vf-temp')?.value||'';
  var hoje=new Date().toISOString().split('T')[0];
  var list=leads.filter(function(l){
    if(l.temperatura!=='Quente'&&l.temperatura!=='Morno')return false;
    if(sdr&&l.sdr!==sdr)return false;
    if(temp&&l.temperatura!==temp)return false;
    return true;
  }).sort(function(a,b){var o={Quente:0,Morno:1};return(o[a.temperatura]||2)-(o[b.temperatura]||2);});
  var cont=document.getElementById('visit-cards'); if(!cont)return;
  if(!list.length){cont.innerHTML='<div style="color:var(--text3);padding:40px;text-align:center;">Nenhum lead quente ou morno</div>';return;}
  cont.innerHTML=list.map(function(l){
    var tc=l.temperatura==='Quente'?'quente':'morno';
    var venc=l.proximo_contato&&l.proximo_contato<hoje;
    return '<div class="vc">'+
      '<div class="vc-top"><div><div class="vc-name">'+x(l.empresa)+'</div><div class="vc-city">'+x(l.cidade)+' · '+l.estado+'</div></div><span class="badge '+tc+'">'+l.temperatura+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">Contato</span><span class="vc-val">'+x(l.contato)+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">WhatsApp</span><span class="vc-val">'+x(l.whatsapp)+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">Segmento</span><span class="vc-val">'+x(l.segmento)+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">SDR</span><span class="vc-val">'+x(l.sdr)+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">M/mês</span><span class="vc-val">'+(l.metros||'—')+'m</span></div>'+
      '<div class="vc-row"><span class="vc-key">Próx. Contato</span><span class="vc-val '+(venc?'vencido':'')+'">'+(l.proximo_contato||'—')+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">Visita</span><span class="vc-val" style="'+(l.visita==='Sim'?'color:var(--green)':'color:var(--text3)')+'">'+l.visita+'</span></div>'+
      '<div class="vc-row"><span class="vc-key">Etapa</span><span class="vc-val">'+l.etapa+'</span></div>'+
      (l.obs?'<div class="vc-obs">'+x(l.obs)+'</div>':'')+
    '</div>';
  }).join('');
}

// ── RANKING ───────────────────────────────────────────────
function renderRanking(){
  var sdrs=[...new Set(leads.map(function(l){return l.sdr;}).filter(Boolean))];
  var data=sdrs.map(function(sdr){return{
    sdr:sdr,
    total:leads.filter(function(l){return l.sdr===sdr;}).length,
    quentes:leads.filter(function(l){return l.sdr===sdr&&l.temperatura==='Quente';}).length,
    visitas:leads.filter(function(l){return l.sdr===sdr&&l.visita==='Sim';}).length,
    fechados:leads.filter(function(l){return l.sdr===sdr&&l.etapa==='Fechado';}).length,
  };}).sort(function(a,b){return b.total-a.total;});
  var rc=document.getElementById('rank-charts');
  if(rc){
    var totC={},qtC={},vtC={};
    data.forEach(function(d){totC[d.sdr]=d.total;qtC[d.sdr]=d.quentes;vtC[d.sdr]=d.visitas;});
    rc.innerHTML=
      '<div class="chart-card"><div class="chart-title">Contatos por SDR</div>'+bars(totC,['#C9A84C'],false)+'</div>'+
      '<div class="chart-card"><div class="chart-title">Quentes por SDR</div>'+bars(qtC,['#E07050'],false)+'</div>'+
      '<div class="chart-card"><div class="chart-title">Visitas por SDR</div>'+bars(vtC,['#5CB87A'],false)+'</div>';
  }
  document.getElementById('ranking-list').innerHTML=data.map(function(d,i){
    return '<div class="rank-row">'+
      '<div class="rank-pos">'+(i+1)+'</div>'+
      '<div class="rank-name">'+d.sdr+'</div>'+
      '<div class="rank-stat"><div class="rank-stat-val">'+d.total+'</div><div class="rank-stat-lbl">leads</div></div>'+
      '<div class="rank-stat"><div class="rank-stat-val" style="color:var(--hot);">'+d.quentes+'</div><div class="rank-stat-lbl">quentes</div></div>'+
      '<div class="rank-stat"><div class="rank-stat-val" style="color:var(--green);">'+d.visitas+'</div><div class="rank-stat-lbl">visitas</div></div>'+
      '<div class="rank-stat"><div class="rank-stat-val" style="color:var(--gold-light);">'+d.fechados+'</div><div class="rank-stat-lbl">fechados</div></div>'+
    '</div>';
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});

function addLead(){
  var emp=document.getElementById('m-empresa').value.trim();
  var seg=document.getElementById('m-seg').value;
  var sdr=document.getElementById('m-sdr').value.trim();
  if(!emp||!seg||!sdr){alert('Preencha Empresa, Segmento e SDR.');return;}
  var nid=leads.length?Math.max.apply(null,leads.map(function(l){return parseInt(l.id)||0;}))+1:1;
  var lead={id:String(nid),empresa:emp,segmento:seg,sdr:sdr,
    contato:document.getElementById('m-contato').value.trim(),
    whatsapp:document.getElementById('m-whatsapp').value.trim(),
    cidade:document.getElementById('m-cidade').value.trim(),
    estado:document.getElementById('m-estado').value,
    etapa:document.getElementById('m-etapa').value,
    temperatura:document.getElementById('m-temp').value,
    metros:parseInt(document.getElementById('m-metros').value)||0,
    proximo_contato:document.getElementById('m-dt').value,
    visita:document.getElementById('m-visita').value,
    obs:document.getElementById('m-obs').value.trim(),
  };
  var btn=document.getElementById('btn-salvar');
  btn.textContent='Salvando...'; btn.disabled=true;
  apiPost({action:'add',lead:lead},
    function(){
      toast('Lead salvo ✓','ok');
      leads.push(lead); filtered=leads.slice();
      closeModal();
      btn.textContent='Salvar'; btn.disabled=false;
      ['m-empresa','m-contato','m-whatsapp','m-cidade','m-sdr','m-metros','m-dt','m-obs'].forEach(function(id){document.getElementById(id).value='';});
      document.getElementById('m-seg').value='';
      document.getElementById('m-temp').value='Novo';
      document.getElementById('m-etapa').value='1 - Identificar';
      renderAll();
    },
    function(err){
      toast('Erro ao salvar: '+err,'err');
      btn.textContent='Salvar'; btn.disabled=false;
    }
  );
}

// ── EXPORT ────────────────────────────────────────────────
function exportCSV(){
  var cols=['id','empresa','contato','whatsapp','segmento','cidade','estado','sdr','etapa','temperatura','metros','proximo_contato','visita','obs'];
  var rows=leads.map(function(l){return cols.map(function(c){return'"'+(l[c]||'').toString().replace(/"/g,'""')+'"';}).join(';');});
  var blob=new Blob(['\ufeff'+[cols.join(';')].concat(rows).join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='unishaft_leads.csv';a.click();
}

// ── NAV ───────────────────────────────────────────────────
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('panel-'+id).classList.add('active');
  var idx={dashboard:0,leads:1,visitas:2,ranking:3};
  document.querySelectorAll('.nav-tab')[idx[id]].classList.add('active');
  if(id==='leads')applyFilters();
  if(id==='ranking')renderRanking();
}

// ── INIT ─────────────────────────────────────────────────
loadLeads();
